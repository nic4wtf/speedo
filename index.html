<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10212b" />
    <title>Telemetry Tracker</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mobile Telemetry</p>
          <h1>Telemetry Tracker</h1>
        </div>
        <button id="installButton" class="secondary-button" hidden>Install</button>
      </header>

      <main class="layout">
        <section class="panel hero-panel">
          <div class="speed-card">
            <p class="eyebrow">Live Speed</p>
            <div class="speed-value">
              <span id="liveSpeed">0</span>
              <span class="unit">km/h</span>
            </div>
            <p id="recordingState" class="status-pill idle">Ready to record</p>
          </div>

          <div class="actions">
            <button id="startButton" class="primary-button">Start Run</button>
            <button id="stopButton" class="danger-button" disabled>Stop Run</button>
          </div>

          <div class="stat-grid">
            <article class="mini-stat">
              <span class="label">GNSS</span>
              <strong id="locationStatus">Waiting</strong>
            </article>
            <article class="mini-stat">
              <span class="label">Motion</span>
              <strong id="motionStatus">Waiting</strong>
            </article>
            <article class="mini-stat">
              <span class="label">Samples</span>
              <strong id="sampleCount">0</strong>
            </article>
          </div>

          <div id="permissionMessage" class="callout" hidden></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Saved Sessions</p>
              <h2>Runs</h2>
            </div>
          </div>
          <div id="runList" class="run-list empty-state">
            <p>No runs yet. Record a session to start building telemetry history.</p>
          </div>
        </section>

        <section class="panel details-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Review</p>
              <h2 id="detailTitle">Run Analysis</h2>
            </div>
            <div class="detail-actions">
              <button id="exportJsonButton" class="secondary-button" disabled>Export JSON</button>
              <button id="exportCsvButton" class="secondary-button" disabled>Export CSV</button>
            </div>
          </div>

          <div id="runDetails" class="details-empty">
            <p>Select a run to inspect speed, acceleration, braking, and trajectory.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
